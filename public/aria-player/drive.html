<!doctype html>
<html lang="ko">
<head>

<title>SNACK — 웹캠으로 움직이는 내 캐릭터</title>
<!-- 공유 미리보기 — og:image = 캐릭터 자신의 master(빌드가 og.png 생성, 모델 무관). 제목=SNACK. -->
<meta property="og:type" content="website" />

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #f2f4f6; color: #191f28; font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; }
  .layout { display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 20px; padding: 20px; height: 100vh; }
  .panel { background: #fff; border-radius: 20px; box-shadow: 0 1px 8px rgba(2, 32, 71, 0.06); padding: 18px; overflow: auto; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #6b7684; font-size: 12.5px; margin-bottom: 14px; }
  .cam { position: relative; border-radius: 14px; overflow: hidden; background: #111; aspect-ratio: 4/3; }
  video, #overlay { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  .row { display: flex; gap: 8px; margin: 14px 0; }
  button { flex: 1; border: 0; border-radius: 12px; padding: 12px 10px; font-size: 14px; font-weight: 700; cursor: pointer; background: #3182f6; color: #fff; }
  button.secondary { background: #eef3f8; color: #3182f6; }
  button:disabled { background: #e5e8eb; color: #b0b8c1; cursor: default; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chip { background: #f2f4f6; border-radius: 99px; padding: 5px 11px; font-size: 12px; color: #4e5968; }
  .chip b { color: #191f28; }
  .params { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .param { display: flex; justify-content: space-between; background: #f9fafb; border-radius: 10px; padding: 7px 10px; font-size: 11.5px; color: #6b7684; }
  .param b { font-variant-numeric: tabular-nums; color: #191f28; }
  iframe { width: 100%; height: 100%; border: 0; border-radius: 20px; background: #fff; box-shadow: 0 1px 8px rgba(2, 32, 71, 0.06); }
  .stage { display: flex; }
  .note { font-size: 12px; color: #8b95a1; margin-top: 10px; line-height: 1.5; }
  /* 방송 모드 (?obs=1): 웹캠 패널 숨김 + 모델 풀스크린 + green screen (OBS 브라우저 소스 크로마키용) */
  body.obs-mode { background: #00b140; }
  body.obs-mode .panel { display: none; }
  body.obs-mode .layout { grid-template-columns: 1fr; padding: 0; gap: 0; height: 100vh; }
  body.obs-mode .stage { height: 100vh; }
  body.obs-mode iframe { border-radius: 0; background: transparent; box-shadow: none; }
  /* 모바일: 세로 적층 — 모델을 위로 크게, 웹캠 패널은 아래로 (좁은 폰에서 모델 찌부 방지) */
  @media (max-width: 760px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: 62vh auto;
      height: auto;
      min-height: 100dvh;
      gap: 10px;
      padding: 10px;
    }
    .stage { order: -1; }
    .stage iframe { height: 62vh; }
    .panel { padding: 14px; }
  }
  /* 인앱 브라우저(카카오톡 등) 안내 — getUserMedia(카메라) 차단으로 움직임이 안 되므로 외부 브라우저 유도 */
  .inapp { position: fixed; inset: 0; z-index: 9999; background: rgba(15, 21, 38, 0.94);
    color: #fff; display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 28px; gap: 16px; }
  .inapp.show { display: flex; }
  .inapp h2 { font-size: 20px; margin: 0; }
  .inapp p { font-size: 14px; color: #c7d0db; line-height: 1.6; margin: 0; max-width: 320px; }
  .inapp button { width: 100%; max-width: 300px; border: 0; border-radius: 12px; padding: 14px 18px;
    font-size: 15px; font-weight: 700; background: #3182f6; color: #fff; cursor: pointer; }
  .inapp button.ghost { background: #2b3344; color: #aeb7c4; font-weight: 600; }
</style>
</head>
<body>
<div class="inapp" id="inappBanner">
  <h2>크롬·사파리에서 열어주세요</h2>
  <p>지금은 카카오톡 같은 앱 안에서 열려 있어요. 카메라(웹캠)가 막혀 캐릭터가 움직이지 않아요. 아래 버튼으로 기본 브라우저에서 열면 잘 작동해요.</p>
  <button id="inappOpen">기본 브라우저로 열기</button>
  <button class="ghost" id="inappDismiss">그냥 둘러볼게요</button>
</div>
<div class="layout">
  <section class="panel">
    <h1>버튜버 만들기</h1>
    <div class="sub" id="modeLabel">웹캠을 켜면 내 얼굴을 따라 캐릭터가 움직여요</div>
    <div class="cam" id="camBox"><video id="video" autoplay playsinline muted></video><canvas id="overlay"></canvas></div>
    <div class="row">
      <button id="startBtn">시작할게요</button>
      <button id="calibrateBtn" class="secondary" disabled>중립 보정</button>
    </div>
    <div class="chips">
      <span class="chip">카메라 <b id="cameraState">꺼짐</b></span>
      <span class="chip">얼굴 <b id="faceState">-</b></span>
      <span class="chip">어깨 <b id="shoulderState">-</b></span>
      <span class="chip">FPS <b id="fpsState">0</b></span>
      <span class="chip">적용 파라미터 <b id="appliedState">0</b></span>
      <span class="chip">프레임 <b id="frameState">0</b></span>
    </div>
    <div class="params" id="paramGrid"></div>
    <div class="note" id="eyeDbg" style="font-family:monospace;white-space:pre">eye debug: 시작 후 표시</div>
    <div class="note">윙크 핫키: <b>Q</b>=왼눈 · <b>W</b>=오른눈 (누르는 동안 감김). 깜빡임은 양눈 자동.</div>
  </section>
  <section class="stage"><iframe id="model" src="index.html?renderer=pixi&clean=1"></iframe></section>
</div>
<script type="module">
const qs = new URLSearchParams(location.search);
const REPLAY = qs.get("replay") === "1";
const AUTO = qs.get("auto") === "1";
const SPEED = Math.max(0.25, Number(qs.get("speed") || 1));
// 기본 = 초록 크로마키(OBS 방송용): green screen + 모델 풀스크린·투명 + 트래킹 자동 시작.
//   ?panel=1 = 웹캠 패널·중립보정 UI(드라이버 셋업용), ?clean=1 = 베이지 풀스크린(초록 대신).
//   (?obs=1은 호환 — 어차피 기본이 초록이라 자동 충족.)
const PANEL = qs.get("panel") === "1";
const CLEAN = qs.get("clean") === "1";
const OBS = !PANEL && !CLEAN; // 파라미터 없으면 초록 크로마키 기본
if (OBS) {
  document.body.classList.add("obs-mode");
  const ifr = document.getElementById("model");
  const u = new URL(ifr.getAttribute("src"), location.href);
  u.searchParams.set("obs", "1");
  u.searchParams.set("transparent", "1");
  ifr.setAttribute("src", u.toString());
  addEventListener("DOMContentLoaded", () => setTimeout(() => document.getElementById("startBtn")?.click(), 600));
} else if (CLEAN) {
  // 베이지 풀스크린(초록 대신) — 캐주얼 공유 옵션
  const ifr = document.getElementById("model");
  const u = new URL(ifr.getAttribute("src"), location.href);
  u.searchParams.set("clean", "1");
  ifr.setAttribute("src", u.toString());
}
// PANEL: 좌측 웹캠 패널 + 우측 모델. iframe은 clean으로 에디터 UI(파츠목록·파라미터·탭) 숨겨 캐릭터만 크게.
if (PANEL) {
  const ifr = document.getElementById("model");
  const u = new URL(ifr.getAttribute("src"), location.href);
  u.searchParams.set("clean", "1");
  ifr.setAttribute("src", u.toString());
}
// 캐릭터 무관: ?project=<url>(Storage 등)을 모델 iframe에 전달 → 아무 아바타나 로드. 미지정 시 빌드 기본.
const PROJECT = qs.get("project");
if (PROJECT) {
  const ifr = document.getElementById("model");
  const u = new URL(ifr.getAttribute("src"), location.href);
  u.searchParams.set("project", PROJECT);
  ifr.setAttribute("src", u.toString());
}

// 인앱 브라우저(카카오톡/페북/인스타/라인/네이버 등)는 카메라(getUserMedia) 차단 → 외부 브라우저 유도
// (초록 기본 모드에서도 카메라가 필요하므로 항상 노출)
const UA = navigator.userAgent || "";
const IN_APP = /KAKAOTALK|FBAN|FBAV|FB_IAB|Instagram|Line\/|NAVER|DaumApps|everytimeApp/i.test(UA);
if (IN_APP) {
  const banner = document.getElementById("inappBanner");
  banner.classList.add("show");
  document.getElementById("inappDismiss").addEventListener("click", () => banner.classList.remove("show"));
  document.getElementById("inappOpen").addEventListener("click", () => {
    const url = location.href;
    if (/KAKAOTALK/i.test(UA)) { location.href = "kakaotalk://web/openExternal?url=" + encodeURIComponent(url); return; }
    if (/android/i.test(UA)) {
      location.href = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
      return;
    }
    navigator.clipboard?.writeText(url).then(
      () => alert("주소를 복사했어요. 사파리/크롬에 붙여넣어 열어주세요."),
      () => alert("우측 상단 메뉴(…)에서 '다른 브라우저로 열기'를 눌러주세요.")
    );
  });
}

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");
const frame = document.getElementById("model");
const els = Object.fromEntries(
  ["startBtn", "calibrateBtn", "cameraState", "faceState", "shoulderState", "fpsState", "appliedState", "frameState", "paramGrid", "modeLabel", "camBox"]
    .map((id) => [id, document.getElementById(id)])
);

const keyParams = [
  "ParamAngleX", "ParamAngleY", "ParamAngleZ", "ParamEyeLOpen", "ParamEyeROpen",
  "ParamEyeBallX", "ParamEyeBallY", "ParamMouthOpenY", "ParamMouthForm",
  "ParamBodyTrackX", "ParamBodyTrackZ", "ParamBodyAngleY", "ParamBreath",
];
const paramEls = new Map();
for (const param of keyParams) {
  const card = document.createElement("div");
  card.className = "param";
  card.innerHTML = `<span>${param.replace("Param", "")}</span><b>0.00</b>`;
  els.paramGrid.appendChild(card);
  paramEls.set(param, card.querySelector("b"));
}

window.__driveReport = { mode: REPLAY ? "replay" : "webcam", frames_applied: 0, applied_counts: [], missing_union: [], last_outputs: null, done: false };

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, Number.isFinite(v) ? v : 0)); }
function normalizeCentered(v, lo, hi) { const m = Math.max(Math.abs(lo), Math.abs(hi)) || 1; return clamp(v / m, -1, 1); }
function remapDeadzone(v, dz, mx) { if (v <= dz) return 0; if (mx <= dz) return 1; return clamp((v - dz) / (mx - dz), 0, 1); }
function avg(...vs) { return vs.reduce((a, b) => a + b, 0) / vs.length; }

let neutral = null;
let latestRaw = null;
let shoulderAuto = null; // 첫 유효 어깨 샘플 = 임시 중립 (보정 버튼이 정밀값으로 대체)

function rawChannels(result, poseResult, nowMs) {
  const landmarks = result.faceLandmarks?.[0];
  const cats = result.faceBlendshapes?.[0]?.categories ?? [];
  const blends = new Map(cats.map((c) => [c.categoryName, c.score]));
  const b = (name) => blends.get(name) ?? 0;
  if (!landmarks) return null;
  const leftEye = landmarks[33] ?? landmarks[130];
  const rightEye = landmarks[263] ?? landmarks[359];
  const nose = landmarks[1] ?? landmarks[4];
  const chin = landmarks[152] ?? landmarks[175];
  const forehead = landmarks[10] ?? landmarks[9];
  if (!leftEye || !rightEye || !nose || !chin || !forehead) return null;
  const eyeDx = rightEye.x - leftEye.x;
  const eyeDy = rightEye.y - leftEye.y;
  const eyeWidth = Math.max(Math.abs(eyeDx), 0.04);
  const faceHeight = Math.max(Math.abs(chin.y - forehead.y), 0.12);
  const eyeCenterX = (leftEye.x + rightEye.x) / 2;
  const eyeCenterY = (leftEye.y + rightEye.y) / 2;
  const rollDeg = Math.atan2(eyeDy, eyeDx) * 180 / Math.PI;
  const yawDeg = clamp(((nose.x - eyeCenterX) / eyeWidth) * 42, -25, 25);
  const pitchDeg = clamp(((eyeCenterY - nose.y) / faceHeight) * 46, -20, 20);
  const gazeX = clamp(avg(b("eyeLookOutRight"), b("eyeLookInLeft")) - avg(b("eyeLookInRight"), b("eyeLookOutLeft")), -1, 1);
  const gazeY = clamp(avg(b("eyeLookUpLeft"), b("eyeLookUpRight")) - avg(b("eyeLookDownLeft"), b("eyeLookDownRight")), -1, 1);
  // SHOULDER-TRACK-001: Pose 11/12 = 어깨 (이미지좌표: 12=화면왼쪽, 11=화면오른쪽 — 눈 규약과 동일 방향)
  let sCh = { shoulder_ok: false };
  const ps = poseResult?.landmarks?.[0];
  if (ps && ps[11] && ps[12] && Math.min(ps[11].visibility ?? 1, ps[12].visibility ?? 1) > 0.5) {
    const sdx = ps[11].x - ps[12].x;
    const sdy = ps[11].y - ps[12].y;
    const rollRaw = Math.atan2(sdy, sdx) * 180 / Math.PI;
    const cxRaw = (ps[11].x + ps[12].x) / 2;
    const cyRaw = (ps[11].y + ps[12].y) / 2;
    if (!shoulderAuto) shoulderAuto = { roll: rollRaw, cx: cxRaw, cy: cyRaw };
    sCh = {
      shoulder_ok: true,
      shoulder_roll_raw: rollRaw, shoulder_cx_raw: cxRaw, shoulder_cy_raw: cyRaw,
      shoulder_width: Math.max(Math.abs(sdx), 0.06),
      shoulder_roll: rollRaw - (neutral?.shoulder_roll_raw ?? shoulderAuto.roll),
      shoulder_cx: cxRaw - (neutral?.shoulder_cx_raw ?? shoulderAuto.cx),
      shoulder_cy: cyRaw - (neutral?.shoulder_cy_raw ?? shoulderAuto.cy),
    };
  }
  return {
    ...sCh,
    head_yaw_raw: yawDeg, head_pitch_raw: pitchDeg, head_roll_raw: rollDeg,
    head_yaw: yawDeg - (neutral?.head_yaw_raw ?? 0),
    head_pitch: pitchDeg - (neutral?.head_pitch_raw ?? 0),
    head_roll: rollDeg - (neutral?.head_roll_raw ?? 0),
    eyeBlinkLeft: b("eyeBlinkLeft"), eyeBlinkRight: b("eyeBlinkRight"),
    eye_gaze_x: gazeX - (neutral?.eye_gaze_x ?? 0),
    eye_gaze_y: gazeY - (neutral?.eye_gaze_y ?? 0),
    jawOpen: b("jawOpen"),
    mouthSmileLeft: b("mouthSmileLeft"), mouthSmileRight: b("mouthSmileRight"),
    mouthFrownLeft: b("mouthFrownLeft"), mouthFrownRight: b("mouthFrownRight"),
    time: (nowMs % 4000) / 4000,
  };
}

function convert(ch) {
  const headYaw = clamp(ch.head_yaw, -25, 25);
  const headPitch = clamp(ch.head_pitch, -20, 20);
  const headRoll = clamp(ch.head_roll, -25, 25);
  // MIRROR-OFF-001: 프리뷰 video는 셀카 거울(scaleX-1)인데 캐릭터는 원본 랜드마크로 구동돼
  // 수평 방향이 사용자와 반대였다(주인님: "왼쪽으로 꺾으면 캐릭터도 왼쪽이어야"). 수평·롤 채널을
  // 반전해 사용자가 보는 거울 프리뷰와 일치시킨다(좌→좌). 수직(pitch·BodyAngleY)·개폐는 불변.
  const M = -1;
  return {
    ParamAngleX: clamp(normalizeCentered(headYaw, -25, 25) * 30 * M, -30, 30),
    ParamAngleY: clamp(normalizeCentered(headPitch, -20, 20) * 30, -30, 30),
    ParamAngleZ: clamp(normalizeCentered(headRoll, -25, 25) * 30 * M, -30, 30),
    // 눈 개폐 — THA4 스왑 리그 실측(capture_pose) 정박. ① 뜬눈 디테일(iris·흰자·속눈썹)은 좌·우 둘 다
    // ParamEyeLOpen 하나에 묶여 있고 ② 0.97~1.0서만 보인다(0.87도 이미 감김 렌더). ⇒ 두 파라미터를
    // 반드시 같은 값으로 구동(벌어지면 한 눈이 뜬눈·blink 모두 숨겨져 소멸)하고, 뜰 땐 1.0까지 SNAP해야 한다.
    // 아카네(연속 메시 리그)와 달리 per-eye 독립·중간값이 THA4선 곧 "감김/소멸"이라 양눈 링크가 필수.
    // 개인화: 데드존을 사용자 눈뜸 평상치에 상대화(중립보정 없이 자동, character-agnostic). 시작은 높게=뜸 바이어스.
    ...(() => {
      const bl = ch.eyeBlinkLeft, br = ch.eyeBlinkRight;
      const maxEB = Math.max(bl, br); // 양눈 링크: 더 감긴 값으로 통일(THA4 필수)
      // EYE-DRIFT-TRACK-001: 고개 들면 eyeBlink가 "적당히" 오르고(실측 0.37→0.54, +0.17 / pitch엔 안 잡힘),
      // 깜빡임은 "확" 오른다(+0.5). baseline을 ① 더 뜨면 빠르게 내리고 ② 조금 위(<0.22)면 pose 드리프트로 보고 추종
      // ③ 확 튀면 깜빡임으로 보고 고정(무시) → 데드존이 현재 눈뜸 레벨을 따라가 어떤 고개각에서도 뜸 유지,
      // 깜빡임만 mx를 넘어 감김. ⚠️ pitch 보정 폐기(고개 들어도 head_pitch=0° 실측 = 죽은코드).
      if (maxEB < eyeOpenBaseline) eyeOpenBaseline += (maxEB - eyeOpenBaseline) * 0.05;
      else if (maxEB - eyeOpenBaseline < 0.28) eyeOpenBaseline += (maxEB - eyeOpenBaseline) * 0.04;
      eyeOpenBaseline = clamp(eyeOpenBaseline, 0.05, 0.60);
      // margin을 넉넉히(+0.28) — baseline 추종 lag 없이도 고개듦(eyeBlink 0.54~0.62)이 처음부터 plateau 안에
      // 들어 "바로 감김" 방지. 추종은 극단각 보너스. 깜빡임(0.85+)만 mx(+0.45) 위라 감김.
      const dz = eyeOpenBaseline + 0.28, mx = eyeOpenBaseline + 0.45;
      // maxEB ≤ dz면 openBoth=1.0(완전 뜸=뜬눈디테일 보임), mx에서 0(감김). 양눈 동일 값.
      const openBoth = clamp(1 - remapDeadzone(maxEB, dz, mx), 0, 1);
      const now = performance.now();
      // THA4선 독립 윙크 불가(뜬눈디테일이 ParamEyeLOpen 공유) → 핫키 Q/W는 양눈 깜빡으로 동작.
      const wkAny = now < winkHold.L || now < winkHold.R;
      const p = smoothEye("L", wkAny ? 0 : openBoth); // 단일 링크값을 두 파라미터에
      const dbg = document.getElementById("eyeDbg");
      if (dbg) dbg.textContent =
        `eyeBlink raw   L ${bl.toFixed(2)}  R ${br.toFixed(2)}  (링크 ${maxEB.toFixed(2)})\n` +
        `자동기준 baseline ${eyeOpenBaseline.toFixed(2)}  데드존(뜸≤${dz.toFixed(2)} · 감김≥${mx.toFixed(2)})\n` +
        `${p > 0.97 ? "○ 뜸(뜬눈 보임)" : p < 0.5 ? "● 감김" : "△ 전환중"}  양눈 링크\n` +
        `윙크 핫키  Q/W = 양눈 깜빡(THA4 독립윙크 불가)  ${wkAny ? "[감김]" : ""}\n` +
        `EyeOpen 최종(L=R)   ${p.toFixed(2)}\n` +
        `입 jawOpen ${(ch.jawOpen||0).toFixed(2)} → MouthOpen ${(() => { const m = clamp(remapDeadzone(ch.jawOpen, 0.05, 0.32), 0, 1); return m.toFixed(2) + " " + (m < 0.24 ? "닫힘" : m < 0.475 ? "small" : m < 0.725 ? "mid" : "wide"); })()}`;
      return { ParamEyeLOpen: p, ParamEyeROpen: p };
    })(),
    ParamEyeBallX: clamp(ch.eye_gaze_x * M, -1, 1),
    ParamEyeBallY: clamp(ch.eye_gaze_y, -1, 1),
    // MOUTH-SENSITIVITY-001: 입 리그는 4단 snap(닫힘<0.24·small<0.475·mid<0.725·wide). 옛 매핑(0.08~0.85)은
    // 말소리 jawOpen(저진폭)이 닫힘 존에 머물러 "말해도 닫힘"(주인님). 상단을 0.32로 낮춰 게인↑ →
    // 말소리가 small/mid/wide에 닿게(0.12→small·0.20→mid·0.25→wide). 바닥 0.05는 숨/정지 닫힘 유지.
    ParamMouthOpenY: clamp(remapDeadzone(ch.jawOpen, 0.05, 0.32), 0, 1),
    ParamMouthForm: clamp(avg(ch.mouthSmileLeft, ch.mouthSmileRight) - avg(ch.mouthFrownLeft, ch.mouthFrownRight), -1, 1),
    // SHOULDER-TRACK-001: 어깨 실측 1:1 (Pose) — 없으면 머리 기반 폴백.
    // BodyAngleX/Z는 스프링 소유라 BodyTrack 입력 채널로 보낸다 (스프링이 노이즈 필터+지연 추종).
    ParamBodyTrackX: smoothTrack("x", ch.shoulder_ok
      ? clamp((ch.shoulder_cx / ch.shoulder_width) * 2.2 * M, -1, 1)
      : clamp(normalizeCentered(headYaw, -25, 25) * 0.65 * M, -1, 1)),
    ParamBodyTrackZ: smoothTrack("z", ch.shoulder_ok
      ? clamp(ch.shoulder_roll / 18 * M, -1, 1)
      : clamp(normalizeCentered(headRoll, -25, 25) * 0.4 * M, -1, 1)),
    ParamBodyAngleY: ch.shoulder_ok
      ? smoothBodyY(clamp((ch.shoulder_cy / ch.shoulder_width) * 14, -10, 10))
      : clamp(normalizeCentered(headPitch, -20, 20) * 10 * 0.45, -10, 10),
    ParamBreath: clamp(0.5 + 0.5 * Math.sin(ch.time * Math.PI * 2), 0, 1),
  };
}

// 어깨 상하(BodyAngleY)는 직결이라 가벼운 평활로 Pose 지터 흡수
let bodyYState = 0;
function smoothBodyY(v) {
  bodyYState = bodyYState * 0.7 + v * 0.3;
  return bodyYState;
}

// 어깨 좌우/기울기(BodyTrackX/Z): 데드존(±5% 잔떨림 무시) + EMA.
// 스프링 필터만으로는 게인 2.2 고주파 지터가 남는다 (004 H2 주인님 실측: 어깨 좌우 떨림) —
// 데드존이 정지 시 미세 노이즈를 0으로, EMA(~3프레임)가 이동 중 떨림을 거른다. 큰 동작 1:1 유지.
const trackState = { x: 0, z: 0 };
function smoothTrack(axis, v) {
  const target = Math.sign(v) * remapDeadzone(Math.abs(v), 0.05, 1);
  trackState[axis] = trackState[axis] * 0.7 + target * 0.3;
  return trackState[axis];
}

// EYE-SMOOTH-001: 눈 개폐도 입·몸처럼 시간축 EMA(~3프레임)로 damping.
// raw eyeBlink는 1프레임에 0↔1로 튀어 "너무 빨리 감김"(주인님)이 됐다 — Live2D/VTube Studio가
// 눈 파라미터에 거는 스무딩과 동일 원리. 감김=빠르게(0.45)·뜸=조금 더 부드럽게(0.3) 비대칭.
const eyeState = { L: 1, R: 1 };
// EYE-BASELINE-ADAPT-002: 사람마다(좁은 눈·안경) 평상 eyeBlink가 다르다(주인님 실측 평상 0.31~0.37로,
// 고정 데드존 0.25~0.48의 절반 지점=가만히 있어도 감김 직전). 중립보정을 빼주지도 않아 개인화 불가였다.
// → 눈 뜬 구간의 낮은 envelope을 baseline으로 추적해 데드존을 상대화([[threshold-relativization-adaptive]]).
let eyeOpenBaseline = 0.30; // 눈 평상 eyeBlink 시작 추정(높게=뜸 바이어스, THA4서 시작 시 감김 방지). 라이브 적응
function smoothEye(side, v) {
  const k = v < eyeState[side] ? 0.45 : 0.3; // 감을 땐 살짝 빠르게, 뜰 땐 부드럽게
  eyeState[side] = eyeState[side] * (1 - k) + v * k;
  return eyeState[side];
}

// EYE-WINK-HOTKEY-001: 안경+MediaPipe 윙크는 신호가 눌려 평상 깜빡임과 안 갈린다(주인님 실측) →
// 트래킹 대신 핫키. Q=왼눈(EyeL), W=오른눈(EyeR), 누르는 동안 감김. 깜빡임은 양눈 링크로 유지.
const winkHold = { L: 0, R: 0 };
addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "q") winkHold.L = performance.now() + 350;
  if (k === "w") winkHold.R = performance.now() + 350;
});

async function probe() {
  const started = performance.now();
  while (performance.now() - started < 20000) {
    const win = frame.contentWindow;
    if (win?.__miniProbe) {
      const ready = await win.__miniProbe.waitReady(15000);
      return ready ? win.__miniProbe : null;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }
  return null;
}

function apply(outputs) {
  const win = frame.contentWindow;
  if (!win?.__miniProbe) return;
  if (win.__miniProject?.physics_profiles?.length) win.__miniStepPhysics?.(1 / 30); // 물리 스프링 라이브 스테핑 (프로파일 있을 때만 — 불필요한 리드로 방지)
  const result = win.__miniProbe.setParameterValues(outputs);
  const report = window.__driveReport;
  report.frames_applied += 1;
  report.applied_counts.push(result.applied.length);
  if (report.applied_counts.length > 4000) report.applied_counts.shift();
  for (const id of result.missing) if (!report.missing_union.includes(id)) report.missing_union.push(id);
  report.last_outputs = outputs;
  els.appliedState.textContent = String(result.applied.length);
  els.frameState.textContent = String(report.frames_applied);
  for (const param of keyParams) {
    const el = paramEls.get(param);
    if (el) el.textContent = (outputs[param] ?? 0).toFixed(2);
  }
}

// ---------- 재생 모드 ----------
async function runReplay() {
  els.modeLabel.textContent = `재생 모드 — 저장된 T1 스트림 주입 (배속 ${SPEED}x)`;
  els.camBox.style.display = "none";
  els.calibrateBtn.style.display = "none";
  els.startBtn.textContent = "재생 시작할게요";
  const stream = await fetch("/api/replay-stream").then((r) => r.json());
  const frames = (stream.frames || []).filter((f) => f.face_present && f.outputs);
  const start = async () => {
    els.startBtn.disabled = true;
    if (!(await probe())) { els.modeLabel.textContent = "모델 로드 실패"; return; }
    els.cameraState.textContent = "재생";
    const t0 = frames[0]?.t_ms ?? 0;
    const begin = performance.now();
    let i = 0;
    const tick = () => {
      const elapsed = (performance.now() - begin) * SPEED;
      // 밀린 프레임 중 마지막 것만 그린다 (중간 프레임 풀 리드로 방지 — 60fps 소스라 시각 동일)
      let last = -1;
      while (i < frames.length && (frames[i].t_ms - t0) <= elapsed) { last = i; i += 1; }
      if (last >= 0) {
        const skipped = Math.max(0, i - 1 - (window.__lastApplied ?? -1) - 1);
        apply(frames[last].outputs);
        const report = window.__driveReport;
        for (let s = 0; s < skipped; s++) { report.frames_applied += 1; report.applied_counts.push(report.applied_counts[report.applied_counts.length - 1] ?? 0); }
        window.__lastApplied = i - 1;
        els.frameState.textContent = String(report.frames_applied);
      }
      els.faceState.textContent = `${i}/${frames.length}`;
      if (i < frames.length) requestAnimationFrame(tick);
      else { window.__driveReport.done = true; els.modeLabel.textContent = "재생 완료"; }
    };
    requestAnimationFrame(tick);
  };
  els.startBtn.addEventListener("click", start);
  if (AUTO) start();
}

// ---------- 웹캠 모드 ----------
async function runWebcam() {
  const { FaceLandmarker, PoseLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14");
  let landmarker = null;
  let poseLandmarker = null; // SHOULDER-TRACK-001: 어깨 실측 (실패 시 머리 기반 폴백)
  let lastVideoTime = -1;
  let frames = 0;
  let fpsWindowStart = performance.now();

  async function loadLandmarker() {
    if (landmarker) return landmarker;
    const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    const options = (delegate) => ({
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
        delegate,
      },
      outputFaceBlendshapes: true,
      runningMode: "VIDEO",
      numFaces: 1,
    });
    try {
      landmarker = await FaceLandmarker.createFromOptions(fileset, options("GPU")); // 프레임 끊김 개선
    } catch (e) {
      console.warn("GPU delegate 실패 — CPU 폴백:", e);
      landmarker = await FaceLandmarker.createFromOptions(fileset, options("CPU"));
    }
    const poseOptions = (delegate) => ({
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
        delegate,
      },
      runningMode: "VIDEO",
      numPoses: 1,
    });
    try {
      poseLandmarker = await PoseLandmarker.createFromOptions(fileset, poseOptions("GPU"));
    } catch (e) {
      try {
        poseLandmarker = await PoseLandmarker.createFromOptions(fileset, poseOptions("CPU"));
      } catch (e2) {
        console.warn("Pose 랜드마커 로드 실패 — 머리 기반 폴백:", e2);
        poseLandmarker = null;
      }
    }
    return landmarker;
  }

  function drawDots(result, poseResult) {
    overlay.width = video.videoWidth || overlay.clientWidth;
    overlay.height = video.videoHeight || overlay.clientHeight;
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const landmarks = result.faceLandmarks?.[0];
    if (landmarks) {
      ctx.fillStyle = "#3182f6";
      for (const idx of [1, 10, 33, 61, 152, 263, 291]) {
        const point = landmarks[idx];
        if (!point) continue;
        ctx.beginPath();
        ctx.arc(point.x * overlay.width, point.y * overlay.height, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // SHOULDER-TRACK-001: 어깨 점 2개 + 어깨선 (주황) — 인식 여부를 한눈에
    const ps = poseResult?.landmarks?.[0];
    if (ps && ps[11] && ps[12]) {
      ctx.strokeStyle = "#f59e0b";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(ps[12].x * overlay.width, ps[12].y * overlay.height);
      ctx.lineTo(ps[11].x * overlay.width, ps[11].y * overlay.height);
      ctx.stroke();
      ctx.fillStyle = "#f59e0b";
      for (const p of [ps[11], ps[12]]) {
        ctx.beginPath();
        ctx.arc(p.x * overlay.width, p.y * overlay.height, 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function loop() {
    if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      const now = performance.now();
      const result = landmarker.detectForVideo(video, now);
      const poseResult = poseLandmarker ? poseLandmarker.detectForVideo(video, now) : null;
      drawDots(result, poseResult);
      const channels = rawChannels(result, poseResult, now);
      if (channels) {
        latestRaw = channels;
        els.faceState.textContent = "인식";
        els.shoulderState.textContent = channels.shoulder_ok ? "인식" : "없음";
        apply(convert(channels));
      } else {
        els.faceState.textContent = "없음";
        // EYE-LOSS-REOPEN-002: 감지 끊기면 마지막 상태 동결 → 직전이 "감기는 중"이면 감긴 채 굳음(주인님).
        // 동결 대신 눈만 능동적으로 뜸으로 복귀시킨다(다른 파라미터는 동결 유지 = 의도된 거동).
        apply({ ParamEyeLOpen: smoothEye("L", 1), ParamEyeROpen: smoothEye("R", 1) });
      }
      frames += 1;
      if (now - fpsWindowStart >= 1000) {
        els.fpsState.textContent = String(frames);
        frames = 0;
        fpsWindowStart = now;
      }
    }
    requestAnimationFrame(loop);
  }

  els.startBtn.addEventListener("click", async () => {
    try {
      els.startBtn.disabled = true;
      els.startBtn.textContent = "준비 중...";
      await loadLandmarker();
      if (!(await probe())) throw new Error("모델 로드 실패");
      const media = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
      video.srcObject = media;
      await video.play();
      els.cameraState.textContent = "켜짐";
      els.calibrateBtn.disabled = false;
      els.startBtn.textContent = "추적 중";
      // 웹캠 켜지면: 무거운 초록 리깅 오버레이 끄고(성능) 에디터 우측 파라미터 패널 복귀 — 웹캠이 리그 구동
      try { document.getElementById("model").contentWindow.__assembly?.showRig(false); } catch (e) {}
      requestAnimationFrame(loop);
    } catch (error) {
      els.cameraState.textContent = "실패";
      els.startBtn.disabled = false;
      els.startBtn.textContent = "다시 시도할게요";
      els.modeLabel.textContent = `카메라를 열 수 없어요: ${error.message}`;
    }
  });

  els.calibrateBtn.addEventListener("click", async () => {
    if (!latestRaw) return;
    const samples = [];
    const started = performance.now();
    els.calibrateBtn.textContent = "측정 중...";
    while (performance.now() - started < 1500) {
      if (latestRaw) samples.push(latestRaw);
      await new Promise((resolve) => setTimeout(resolve, 60));
    }
    const mean = (key) => samples.reduce((acc, item) => acc + (item[key] ?? 0), 0) / Math.max(samples.length, 1);
    // 어깨 중립은 어깨가 인식된 샘플로만 (Pose 미인식 중 보정해도 0으로 오염되지 않게)
    const sSamples = samples.filter((item) => item.shoulder_ok);
    const sMean = (key) => sSamples.reduce((acc, item) => acc + (item[key] ?? 0), 0) / Math.max(sSamples.length, 1);
    const shoulderNeutral = sSamples.length
      ? { shoulder_roll_raw: sMean("shoulder_roll_raw"), shoulder_cx_raw: sMean("shoulder_cx_raw"), shoulder_cy_raw: sMean("shoulder_cy_raw") }
      : {};
    neutral = {
      ...shoulderNeutral,
      head_yaw_raw: mean("head_yaw_raw"),
      head_pitch_raw: mean("head_pitch_raw"),
      head_roll_raw: mean("head_roll_raw"),
      eye_gaze_x: mean("eye_gaze_x"),
      eye_gaze_y: mean("eye_gaze_y"),
    };
    els.calibrateBtn.textContent = "보정 완료";
  });
}

// 검증 훅: 합성 랜드마크로 어깨→채널→매핑→모델 경로를 카메라 없이 검사 (SHOULDER-TRACK-001)
window.__driveTest = { rawChannels, convert, apply };

// EXPR-SET-001 표정 바·핫키: 오버레이-스왑 정렬 한계로 실패 판정(2026-06-18) → 제거.

if (REPLAY) runReplay();
else runWebcam();
</script>
</body>
