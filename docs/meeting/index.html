    <h3>기능 수정</h3>
    <label>기능 이름</label><input id="m_name">

    <div class="actions">

      <span class="spacer"></span>
      <button class="btn" id="m_cancel">취소</button>
      <button class="btn primary" id="m_save">저장</button>
    </div>
  </div></div>

const KEY='snackweb-meeting-v2';
let filters={P0:true,P1:true,P2:true};
let editId=null;

function freshState(){
  return {
    features:SEED_FEATURES.map(([id,name,page,prio,deps,add])=>({id,name,page,prio,deps,add:!!add,status:'todo',memo:'',x:null,y:null})),
    zones:[], notes:{}, page:'room', tpl:{}
  };
}
function placeTemplate(s,page,idx){
  const tpl=(TEMPLATES[page]||[])[idx]; if(!tpl)return;
  tpl.zones.forEach((z,i)=>s.zones.push({id:'z_'+page+'_'+idx+'_'+i,page,label:z.label,x:z.x,y:z.y,w:z.w,h:z.h}));
  Object.entries(tpl.assign||{}).forEach(([zi,fids])=>{
    const z=tpl.zones[zi];
    fids.forEach((fid,k)=>{const f=s.features.find(x=>x.id===fid); if(f){f.x=z.x+12; f.y=z.y+30+k*60;}});
  });
  (s.tpl||(s.tpl={}))[page]=idx;
}
function seedAll(s){ Object.keys(TEMPLATES).forEach(pg=>placeTemplate(s,pg,0)); }
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.features) return s;}catch(e){}
  const s=freshState(); seedAll(s); return s;
}
function save(){ localStorage.setItem(KEY,JSON.stringify(state)); }
let state=load();

const $=s=>document.querySelector(s);
const canvas=$('#canvas');
function visible(f){ return f.page===state.page && filters[f.prio]; }

function renderTabs(){
  const t=$('#tabs'); t.innerHTML='';
  PAGES.forEach(p=>{
    const n=state.features.filter(f=>f.page===p.key).length;
    const el=document.createElement('div');
    el.className='tab'+(p.key===state.page?' active':'');
    el.innerHTML=p.label+(n?` <span class="cnt">${n}</span>`:'');
    el.onclick=()=>{state.page=p.key;save();render();};
    t.appendChild(el);
  });
}
function renderTplSel(){
  const sel=$('#tplSel'); const list=TEMPLATES[state.page]||[];
  if(list.length<1){sel.innerHTML='<option>—</option>';sel.disabled=true;return;}
  sel.disabled=false;
  sel.innerHTML=list.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('');
  const cur=(state.tpl&&state.tpl[state.page]!=null)?state.tpl[state.page]:0;
  sel.value=cur;
}
function cardHTML(f){
  const star=f.add?'<span class="star">★</span> ':'';
  const dep=f.deps?`<span class="dep">${f.deps}</span>`:'';
  const memo=f.memo?`<div class="memo">📝 ${escapeHtml(f.memo)}</div>`:'';
  const stLabel={todo:'논의 중',confirmed:'확정',hold:'보류'}[f.status];
  return `<div class="id">${f.id}</div><div class="nm">${star}${escapeHtml(f.name)}</div>
   <div class="row"><span class="pill ${f.prio}">${f.prio}</span>
   <span class="status ${f.status}" data-act="status">${stLabel}</span>${dep}</div>${memo}`;
}
function makeCard(f){
  const el=document.createElement('div');
  el.className='card '+f.prio.toLowerCase();
  el.dataset.id=f.id;
  el.innerHTML=cardHTML(f);
  el.addEventListener('pointerdown',e=>startDragCard(e,f,el));
  el.addEventListener('dblclick',e=>{e.stopPropagation();openEdit(f.id);});
  el.querySelector('[data-act=status]').addEventListener('click',e=>{
    e.stopPropagation();
    f.status=({todo:'confirmed',confirmed:'hold',hold:'todo'})[f.status];
    save();render();
  });
  return el;
}
function renderPalette(){
  const list=$('#palList'); list.innerHTML='';
  const items=state.features.filter(f=>visible(f)&&f.x==null);
  items.forEach(f=>list.appendChild(makeCard(f)));
  $('#palCnt').textContent='('+items.length+')';
}
function renderCanvas(){
  canvas.innerHTML='';
  state.zones.filter(z=>z.page===state.page).forEach(z=>canvas.appendChild(makeZone(z)));
  state.features.filter(f=>visible(f)&&f.x!=null).forEach(f=>{
    const el=makeCard(f); el.style.left=f.x+'px'; el.style.top=f.y+'px'; canvas.appendChild(el);
  });
}
function renderNote(){ $('#note').value=state.notes[state.page]||''; }
function render(){ renderTabs(); renderTplSel(); renderPalette(); renderCanvas(); renderNote(); }

/* ---- 카드 드래그: 팔레트↔캔버스, 캔버스 내 이동 ---- */
function startDragCard(e,f,el){
  if(e.target.closest('[data-act]')) return;
  const sx=e.clientX, sy=e.clientY;
  let moved=false,dx=0,dy=0;
  const move=ev=>{
    if(!moved){
      if(Math.abs(ev.clientX-sx)+Math.abs(ev.clientY-sy)<5) return; // 임계 미만 = 클릭으로 둠
      moved=true;
      const r=el.getBoundingClientRect(); dx=sx-r.left; dy=sy-r.top;
      el.classList.add('dragging'); el.style.position='fixed'; el.style.width=r.width+'px';
      document.body.appendChild(el);
    }
    ev.preventDefault();
    el.style.left=(ev.clientX-dx)+'px'; el.style.top=(ev.clientY-dy)+'px';
  };
  const up=ev=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    if(!moved) return; // 클릭/더블클릭은 그대로 통과(편집·상태토글)
    const c=canvas.getBoundingClientRect();
    const inCanvas=ev.clientX>=c.left&&ev.clientX<=c.right&&ev.clientY>=c.top&&ev.clientY<=c.bottom;
    if(inCanvas){
      f.x=Math.max(0,(ev.clientX-dx)-c.left+canvas.scrollLeft);
      f.y=Math.max(0,(ev.clientY-dy)-c.top+canvas.scrollTop);
    }else{ f.x=null; f.y=null; }
    el.remove(); // 유령 엘리먼트 제거 후 재렌더
    save(); render();
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}

/* ---- 영역(zone) ---- */
function makeZone(z){
  const el=document.createElement('div');
  el.className='zone';
  el.style.left=z.x+'px'; el.style.top=z.y+'px'; el.style.width=z.w+'px'; el.style.height=z.h+'px';
  el.innerHTML=`<div class="zhead">${escapeHtml(z.label)}</div><div class="zdel">✕</div><div class="zhandle"></div>`;
  el.querySelector('.zhead').addEventListener('pointerdown',e=>startDragZone(e,z,'move'));
  el.querySelector('.zhead').addEventListener('dblclick',e=>{e.stopPropagation();const v=prompt('영역 이름',z.label);if(v!=null){z.label=v;save();render();}});
  el.querySelector('.zhandle').addEventListener('pointerdown',e=>startDragZone(e,z,'resize'));
  el.querySelector('.zdel').addEventListener('click',e=>{e.stopPropagation();if(confirm('영역을 삭제할까요?')){state.zones=state.zones.filter(x=>x!==z);save();render();}});
  return el;
}
function startDragZone(e,z,mode){
  e.preventDefault(); e.stopPropagation();
  const sx=e.clientX, sy=e.clientY, ox=z.x, oy=z.y, ow=z.w, oh=z.h;
  const move=ev=>{
    if(mode==='move'){ z.x=Math.max(0,ox+(ev.clientX-sx)); z.y=Math.max(0,oy+(ev.clientY-sy)); }
    else{ z.w=Math.max(120,ow+(ev.clientX-sx)); z.h=Math.max(70,oh+(ev.clientY-sy)); }
    renderCanvas();
  };
  const up=()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);save();};
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}

/* ---- 편집 모달 ---- */
function openEdit(id){
  editId=id; const f=state.features.find(x=>x.id===id); if(!f)return;
  $('#m_name').value=f.name; $('#m_desc').value=f.desc||''; $('#m_memo').value=f.memo||'';
  $('#m_prio').value=f.prio; $('#m_status').value=f.status; $('#m_deps').value=f.deps||'';
  const ps=$('#m_page'); ps.innerHTML=PAGES.map(p=>`<option value="${p.key}">${p.label}</option>`).join(''); ps.value=f.page;
  $('#modal').hidden=false;
}
$('#m_cancel').onclick=()=>{$('#modal').hidden=true;editId=null;};
$('#m_save').onclick=()=>{
  const f=state.features.find(x=>x.id===editId); if(!f)return;
  f.name=$('#m_name').value.trim(); f.desc=$('#m_desc').value; f.memo=$('#m_memo').value;
  f.prio=$('#m_prio').value; f.status=$('#m_status').value; f.deps=$('#m_deps').value.trim();
  const np=$('#m_page').value; if(np!==f.page){f.page=np;f.x=null;f.y=null;}
  $('#modal').hidden=true; editId=null; save(); render();
};
$('#m_delete').onclick=()=>{ if(confirm('이 기능 카드를 삭제할까요?')){state.features=state.features.filter(x=>x.id!==editId);$('#modal').hidden=true;editId=null;save();render();} };

/* ---- 툴바 ---- */
$('#tplSel').onchange=e=>{
  const idx=+e.target.value;
  if(!confirm('이 화면을 「'+TEMPLATES[state.page][idx].name+'」 템플릿으로 다시 적용할까요? (현재 배치를 덮어씁니다)')){renderTplSel();return;}
  state.zones=state.zones.filter(z=>z.page!==state.page);
  state.features.forEach(f=>{if(f.page===state.page){f.x=null;f.y=null;}});
  placeTemplate(state,state.page,idx);
  save(); render();
};
$('#addZone').onclick=()=>{ state.zones.push({id:'z'+Date.now(),page:state.page,label:'새 영역',x:120,y:120,w:240,h:160}); save(); render(); };
$('#addFeat').onclick=()=>{
  const id='NEW-'+(state.features.filter(f=>f.id.startsWith('NEW-')).length+1);
  state.features.push({id,name:'새 기능',page:state.page,prio:'P1',deps:'',add:true,status:'todo',memo:'',x:null,y:null});
  save(); render(); openEdit(id);
};
document.querySelectorAll('.filters input').forEach(c=>c.onchange=()=>{filters[c.dataset.f]=c.checked;render();});
$('#note').addEventListener('input',()=>{state.notes[state.page]=$('#note').value;save();});
$('#exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='meeting-snapshot.json'; a.click(); URL.revokeObjectURL(a.href);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const rd=new FileReader(); rd.onload=()=>{ try{const s=JSON.parse(rd.result); if(s.features){state=s; save(); render();}}catch(err){alert('파일을 읽지 못했습니다: '+err);} }; rd.readAsText(file);
  e.target.value='';
};
$('#resetBtn').onclick=()=>{ if(confirm('처음 상태(템플릿 시작 배치)로 되돌릴까요? 현재 배치와 메모가 삭제됩니다.')){state=freshState();seedAll(state);save();render();} };

function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

render();
</script>
